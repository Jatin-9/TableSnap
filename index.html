<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Runs before React mounts — reads localStorage so the dark class is on
         <html> immediately, preventing the white flash on page load/refresh. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <title>TableSnap — Snap a photo. Get a table. Talk to your data.</title>
    <meta name="description" content="Upload a photo of any table and let AI extract, organize, and help you learn from your data. Chat with it, export to CSV, create flashcards, send to Anki." />
    <meta property="og:title" content="TableSnap — AI-Powered OCR Table Organizer" />
    <meta property="og:description" content="Snap a photo. Get a table. Talk to your data." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TableSnap — AI-Powered OCR Table Organizer" />
    <meta name="twitter:description" content="Snap a photo. Get a table. Talk to your data." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
