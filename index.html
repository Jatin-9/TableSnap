<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Runs before React mounts — reads localStorage so the dark class is on
         <html> immediately, preventing the white flash on page load/refresh. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <title>TableSnap — Snap a photo. Get a table. Talk to your data.</title>
    <meta name="description" content="Upload a photo of any table and let AI extract, organize, and help you learn from your data. Chat with it, export to CSV, create flashcards, send to Anki." />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Discord) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://tablesnap.co.in" />
    <meta property="og:title"       content="TableSnap — Snap a photo. Get a table. Talk to your data." />
    <meta property="og:description" content="AI-powered OCR that turns any photo of a table into clean, structured data. Chat with it, study flashcards, export to Anki, and more." />
    <meta property="og:image"       content="https://tablesnap.co.in/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@tablesnap" />
    <meta name="twitter:title"       content="TableSnap — Snap a photo. Get a table. Talk to your data." />
    <meta name="twitter:description" content="AI-powered OCR that turns any photo of a table into clean, structured data. Chat with it, study flashcards, export to Anki, and more." />
    <meta name="twitter:image"       content="https://tablesnap.co.in/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
